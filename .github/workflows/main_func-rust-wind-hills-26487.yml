# Docs:
#   Run From Package (external URL / blob):
#     https://learn.microsoft.com/azure/azure-functions/run-functions-from-deployment-package
#   OIDC federated login for GitHub Actions:
#     https://learn.microsoft.com/azure/developer/github/connect-from-azure
#
# Deploys by uploading a zip to a private blob container and pointing the
# Function App's WEBSITE_RUN_FROM_PACKAGE setting at it via a short-lived,
# read-only SAS URL. Azure then mounts that package as a read-only file
# system rather than extracting it onto the site's local disk — no partial
# deploys, no file locks, and the running app cannot write over its own
# code. Each push is a new immutable blob named by commit SHA; nothing is
# ever deleted here, so old releases stay available for rollback via
# scripts/rollback-release.sh (set WEBSITE_RUN_FROM_PACKAGE back to an
# older blob's URL).
#
# One-time setup this workflow depends on (see scripts/setup-github-oidc.sh):
#   - An Azure AD app registration federated to this repo (no client secret)
#   - That identity holds "Storage Blob Data Contributor" + "Storage Blob
#     Delegator" on the storage account, and "Website Contributor" on the
#     Function App
#   - GitHub repo secrets: AZURE_CLIENT_ID, AZURE_TENANT_ID,
#     AZURE_SUBSCRIPTION_ID, AZURE_RESOURCE_GROUP, AZURE_STORAGE_ACCOUNT

name: Build and deploy Node.js project to Azure Function App - func-rust-wind-hills-26487

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: 'func-rust-wind-hills-26487'
  DEPLOY_CONTAINER: 'function-releases'
  NODE_VERSION: '24.x'

permissions:
  contents: read
  id-token: write # required for azure/login OIDC federation

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install, build, test
        run: |
          npm ci
          npm run build --if-present
          npm test

      - name: Drop dev-only dependencies from the deployed package
        run: npm prune --omit=dev

      - name: Zip the deployment package
        run: |
          zip -r ../release.zip . \
            -x '.git/*' '.github/*' 'test/*' 'scratchpad/*' \
            'local.settings*.json' '*.md' '.gitignore'
          mv ../release.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: release-package
          path: release.zip
          retention-days: 14

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: Production
      url: https://${{ env.AZURE_FUNCTIONAPP_NAME }}.azurewebsites.net
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-package

      - name: Azure login (OIDC, no stored secret)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Upload the package as an immutable, SHA-named blob
        run: |
          az storage blob upload \
            --account-name "${{ secrets.AZURE_STORAGE_ACCOUNT }}" \
            --container-name "$DEPLOY_CONTAINER" \
            --name "release-${{ github.sha }}.zip" \
            --file release.zip \
            --auth-mode login \
            --overwrite true \
            --only-show-errors

      - name: Mint a read-only, user-delegated SAS for the package
        id: sas
        run: |
          expiry=$(date -u -d '+10 years' '+%Y-%m-%dT%H:%MZ')
          sas=$(az storage blob generate-sas \
            --account-name "${{ secrets.AZURE_STORAGE_ACCOUNT }}" \
            --container-name "$DEPLOY_CONTAINER" \
            --name "release-${{ github.sha }}.zip" \
            --permissions r \
            --https-only \
            --expiry "$expiry" \
            --auth-mode login --as-user \
            --output tsv)
          url="https://${{ secrets.AZURE_STORAGE_ACCOUNT }}.blob.core.windows.net/$DEPLOY_CONTAINER/release-${{ github.sha }}.zip?$sas"
          echo "::add-mask::$sas"
          echo "package_url=$url" >> "$GITHUB_OUTPUT"

      - name: Point the Function App at the package (read-only mount)
        run: |
          az functionapp config appsettings set \
            --name "$AZURE_FUNCTIONAPP_NAME" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --settings WEBSITE_RUN_FROM_PACKAGE="${{ steps.sas.outputs.package_url }}" \
            --output none

      - name: Sync triggers so the new package takes effect immediately
        run: |
          az functionapp sync-triggers \
            --name "$AZURE_FUNCTIONAPP_NAME" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}"
