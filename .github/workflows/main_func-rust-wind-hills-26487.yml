# Build and deploy to Azure Functions WITHOUT any third-party (Azure/*) action.
# Uses run-from-package: the zip is stored by Kudu and mounted read-only by the
# Functions host — no extraction step, no file locks, no crashes from files
# being overwritten mid-process. Requires WEBSITE_RUN_FROM_PACKAGE=1 in the
# Function App's Application Settings (Azure Portal -> Configuration; also set
# by scripts/provision-azure.sh for freshly provisioned apps).
#
# Single job on windows-latest to match the target Function App's OS. This
# project has no native modules today, but building on the same OS as the
# deployed host avoids any future platform-specific npm resolution surprises.

name: Build and deploy Node.js project to Azure Function App - func-rust-wind-hills-26487

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Serialise deploys so a new run never collides with an in-flight deployment
# (Kudu rejects concurrent deployments with a "pending operation" lock).
concurrency:
  group: deploy-func-rust-wind-hills-26487
  cancel-in-progress: false

env:
  NODE_VERSION: '24.x' # match the Function App runtime (Node 24)

jobs:
  build-and-deploy:
    runs-on: windows-latest
    permissions:
      contents: read # required for actions/checkout

    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }} Environment
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 'Resolve Project Dependencies Using Npm'
        shell: pwsh
        run: |
          npm ci
          npm run build --if-present
          npm run smoke:entrypoint
          npm run test --if-present
          npm run validate
          npm run check:reachability
          npm run simulate
          npm prune --omit=dev
          node scripts/verify-functions-entrypoint.js

      # Ship only the runtime artifact: the engine source, the adventure assets
      # and manifest it loads at startup, production node_modules, and the manifests the
      # host needs. 7-Zip is preinstalled on the runner and handles deep
      # node_modules paths better than Compress-Archive.
      - name: 'Package runtime artifact'
        shell: pwsh
        run: |
          $items = @('src','adventures','rust_wind_hills_adventure_knowledge_graph.json','node_modules','host.json','package.json','package-lock.json','.funcignore') |
            Where-Object { Test-Path $_ }
          7z a -tzip app.zip @items | Out-Null
          if (-not (Test-Path 'app.zip')) { throw 'app.zip was not created' }
          "Packaged: $((Get-Item app.zip).Length) bytes" | Write-Host

      # Deploy via Kudu zipdeploy with run-from-package. The zip is stored and
      # mounted read-only by the Functions host — no extraction, instant swap.
      - name: 'Deploy to Azure Functions (Kudu zipdeploy, run-from-package)'
        shell: pwsh
        env:
          PUBLISH_PROFILE: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_C1729A9A004B4ADF90F007092812D33D }}
        run: |
          $ErrorActionPreference = 'Stop'
          [xml]$pp = $env:PUBLISH_PROFILE
          $profile = $pp.publishData.publishProfile |
            Where-Object { $_.publishMethod -eq 'ZipDeploy' } | Select-Object -First 1
          if (-not $profile) {
            $profile = $pp.publishData.publishProfile |
              Where-Object { $_.publishMethod -eq 'MSDeploy' } | Select-Object -First 1
          }
          if (-not $profile) { throw 'No ZipDeploy/MSDeploy entry in publish profile' }

          $scmHost = ($profile.publishUrl -replace '^https?://','') -replace '/.*$','' -replace ':\d+$',''
          $pair = "$($profile.userName):$($profile.userPWD)"
          $auth = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes($pair))
          $headers = @{ Authorization = "Basic $auth" }

          # Verify WEBSITE_RUN_FROM_PACKAGE is set (warn if not — deploy will still
          # work but falls back to extract mode, losing the read-only guarantee).
          Write-Host "Checking WEBSITE_RUN_FROM_PACKAGE app setting..."
          try {
            $settings = Invoke-RestMethod -Uri "https://$scmHost/api/settings" `
              -Headers $headers -TimeoutSec 30
            $rfp = $settings.WEBSITE_RUN_FROM_PACKAGE
            if ($rfp -eq '1' -or $rfp -eq 1) {
              Write-Host "  WEBSITE_RUN_FROM_PACKAGE=1 confirmed (run-from-package active)."
            } else {
              Write-Host "::warning::WEBSITE_RUN_FROM_PACKAGE is not set to '1'. Deploy will extract instead of mount. Set it in Azure Portal > Configuration > Application Settings."
            }
          } catch {
            Write-Host "  (could not verify setting: $($_.Exception.Message))"
          }

          $deployUri = "https://$scmHost/api/zipdeploy?isAsync=true"
          $resp = $null
          $maxAttempts = 6
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            try {
              Write-Host "Upload attempt $attempt/$maxAttempts -> $deployUri"
              $resp = Invoke-WebRequest -Uri $deployUri -Method POST -InFile 'app.zip' `
                -ContentType 'application/zip' -Headers $headers -TimeoutSec 600
              break
            } catch {
              $code = $null
              try { $code = [int]$_.Exception.Response.StatusCode } catch {}
              $msg = $_.Exception.Message
              $locked = ($code -eq 409) -or ($msg -match 'pending') -or ($msg -match 'retry operation later')
              if ($attempt -lt $maxAttempts -and $locked) {
                $wait = 30 * $attempt
                Write-Host "  deployment busy (HTTP $code). Waiting ${wait}s then retrying."
                Start-Sleep -Seconds $wait
                continue
              }
              throw
            }
          }
          if (-not $resp) { throw 'Upload failed after retries' }
          Write-Host "Upload accepted: HTTP $($resp.StatusCode)"

          $pollUrl = $resp.Headers.Location
          if ($pollUrl -is [array]) { $pollUrl = $pollUrl[0] }
          if (-not $pollUrl) { $pollUrl = "https://$scmHost/api/deployments/latest" }
          Write-Host "Polling deployment status at $pollUrl"

          $deadline = (Get-Date).AddMinutes(5)
          while ($true) {
            Start-Sleep -Seconds 5
            try {
              $status = Invoke-RestMethod -Uri $pollUrl -Headers $headers -TimeoutSec 120
            } catch {
              if ((Get-Date) -gt $deadline) { throw }
              Write-Host "  (transient poll error: $($_.Exception.Message))"
              continue
            }
            Write-Host "  status=$($status.status) complete=$($status.complete) $($status.statusText)"
            if ($status.complete -eq $true -or $status.status -eq 4 -or $status.status -eq 3) {
              if ($status.status -eq 4) { Write-Host 'Deployment succeeded.'; break }
              throw "Deployment failed (status=$($status.status)): $($status.statusText)"
            }
            if ((Get-Date) -gt $deadline) { throw 'Timed out waiting for deployment to complete.' }
          }

          # Force a trigger sync so the Functions host picks up the new package.
          Write-Host "Syncing function triggers..."
          try {
            Invoke-RestMethod -Uri "https://$scmHost/api/functions/synctriggers" `
              -Method POST -Headers $headers -TimeoutSec 60 | Out-Null
            Write-Host "Trigger sync requested."
          } catch {
            Write-Host "  (trigger sync non-fatal: $($_.Exception.Message))"
          }

          # Health check — with run-from-package the host should come up fast
          # since there's no extraction step.
          $appHost = $scmHost -replace '\.scm\.', '.'
          $healthUrl = "https://$appHost/api/health"
          Write-Host "Polling app health at $healthUrl (up to 2 min)..."

          $healthDeadline = (Get-Date).AddMinutes(2)
          $healthy = $false
          while ((Get-Date) -lt $healthDeadline) {
            Start-Sleep -Seconds 10
            try {
              $h = Invoke-RestMethod -Uri $healthUrl -Method GET -TimeoutSec 20
              if ($h.ok -eq $true) {
                Write-Host "  App health OK. ready=$($h.data.configuration.ready)"
                $healthy = $true
                break
              }
              Write-Host "  ok=false; retrying..."
            } catch {
              Write-Host "  (not yet: $($_.Exception.Message))"
            }
          }

          if (-not $healthy) {
            Write-Host "Host did not come up within 2 min — triggering restart..."
            try {
              Invoke-RestMethod -Uri "https://$scmHost/api/restart" -Method POST `
                -Headers $headers -TimeoutSec 60 | Out-Null
              Write-Host "  Restart requested. Waiting 30s..."
            } catch {
              Write-Host "  (restart non-fatal: $($_.Exception.Message))"
            }
            Start-Sleep -Seconds 30

            try {
              $h = Invoke-RestMethod -Uri $healthUrl -Method GET -TimeoutSec 30
              if ($h.ok -eq $true) {
                Write-Host "  App recovered after restart."
              } else {
                throw "App health returned ok=false after restart. Check Azure portal logs."
              }
            } catch [System.Net.WebException] {
              throw "App still unreachable after restart. Check Azure portal for errors."
            }
          }
